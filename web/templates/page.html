<!DOCTYPE html>
<html lang="en" data-theme="{{.Theme}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}}</title>
<link rel="stylesheet" href="/assets/app.css">
<link rel="stylesheet" href="/assets/markdown.css">
<link rel="stylesheet" href="/assets/chroma.css">
{{if .HasVendorKatex}}<link rel="stylesheet" href="/assets/vendor/katex.min.css">{{end}}
<link rel="stylesheet" href="/user.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="brand" title="{{.BrandName}}">{{.BrandName}}</span>
      <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">◐</button>
    </div>
    <div class="tree-controls">
      <input id="filter" type="search" placeholder="Filter files…" autocomplete="off" spellcheck="false">
      <button id="expand-all" type="button" title="Expand all" aria-label="Expand all"><svg class="ctrl-icon" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path d="M4.5 6 8 2.5 11.5 6"/><path d="M4.5 10 8 13.5 11.5 10"/></svg></button>
      <button id="collapse-all" type="button" title="Collapse all" aria-label="Collapse all"><svg class="ctrl-icon" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path d="M4.5 2.5 8 6l3.5-3.5"/><path d="M4.5 13.5 8 10l3.5 3.5"/></svg></button>
    </div>
    <nav id="tree" aria-label="File tree">{{.TreeHTML}}</nav>
  </aside>
  <div id="resizer" title="Drag to resize"></div>
  <main id="main">
    <header id="breadcrumb">{{.BreadcrumbHTML}}</header>
    <article id="content" class="markdown-body">{{.ContentHTML}}</article>
  </main>
  <nav id="toc" aria-label="Table of contents">{{.TOCHTML}}</nav>
</div>
<div id="reload-status" hidden>reconnecting…</div>
<script>
  window.GFMVIEW = {
    initialPath: {{.InitialPathJSON}},
    reload: {{.Reload}},
    vendor: { katex: {{.HasVendorKatex}}, mermaid: {{.HasVendorMermaid}} }
  };
</script>
{{if .HasVendorKatex}}<script defer src="/assets/vendor/katex.min.js"></script>
<script defer src="/assets/vendor/auto-render.min.js"></script>{{end}}
{{if .HasVendorMermaid}}<script defer src="/assets/vendor/mermaid.min.js"></script>{{end}}
<script defer src="/assets/app.js"></script>
</body>
</html>
